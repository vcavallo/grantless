# Local strfry relay for Grantless dev & e2e tests. Dev/test only — never a
# production or privileged relay. The DB is tmpfs (RAM): every start is a clean
# slate and `down` leaves nothing behind.
services:
  strfry:
    image: dockurr/strfry
    container_name: grantless-strfry
    ports:
      - "${RELAY_PORT:-7787}:7777"
    volumes:
      - ./strfry.conf:/etc/strfry.conf:ro
    tmpfs:
      - /app/strfry-db
