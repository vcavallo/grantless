# strfry router config — continuous (real-time) mirror of curation lists.
#
# An alternative to the cron'd sync-curation.sh: `strfry router` keeps a live
# subscription open and streams matching events down as they're published. Proxy-
# safe (plain REQ subscription — no NIP-77 needed). It streams events from connect
# time, so run sync-curation.sh ONCE first to backfill history, then run the router
# for ongoing updates (a low-frequency cron sync covers any reconnect gaps).
#
#   strfry router relay/router.conf
#
# NOT privileged / forkable: swap the relay below for your own point-of-view relay
# and it works identically. Pull-only ("down") — we never write upstream.
#
# ⚠️ The strfry router config schema has shifted across releases. VERIFY the keys
# against YOUR strfry version (`strfry router --help` / the strfry docs) before
# relying on this — treat it as a starting example, not gospel.

connections {
    grantless-curation-down {
        dir = "down"
        filter = { "kinds": [30392] }
        urls = [
            "wss://tags.brainstorm.world/relay"
        ]
    }
}
